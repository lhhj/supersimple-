<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World - PCAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e0e0e0;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 16px;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,212,255,0.15);
    }
    h1 {
      font-size: 3.5rem;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0,212,255,0.6);
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      color: #a0c4d8;
      margin-top: 0.5rem;
    }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      background: rgba(0,212,255,0.15);
      border: 1px solid #00d4ff;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #00d4ff;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Hello World!</h1>
    <p>Deployed on <strong>HPE Private Cloud AI (PCAI)</strong></p>
    <p>Running in Kubernetes &mdash; built with GitHub Actions &amp; Docker Hub</p>
    <div class="badge">SUPERSIMPLE · v1.0.0</div>
  </div>
</body>
</html>
