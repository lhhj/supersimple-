# Default values for helloworld Helm chart.
# These are overridden by the CI/CD pipeline automatically.

replicaCount: 1

image:
  repository: YOUR_DOCKERHUB_USER/helloworld
  pullPolicy: Always
  tag: "latest"

# LLM reverse proxy — set this to your PCAI LLM base URL (OpenAI-compatible).
# The nginx container proxies /llm/ → llmEndpoint/ to avoid browser CORS issues.
# Example: "https://my-llm.pcai.danofficeit.com/v1"
llmEndpoint: "http://your-llm-service.your-namespace.svc.cluster.local/v1"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: "helloworld"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false   # Disabled — PCAI uses Istio VirtualService (see ezua section below), not nginx ingress
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: home.ai-application.pcai.danofficeit.com
      paths:
        - path: /helloworld
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# ─────────────────────────────────────────────────────────────────
# HPE PCAI / AI Essentials platform options
# ${DOMAIN_NAME}, ${NAMESPACE}, ${RELEASE_NAME} are substituted
# automatically by PCAI at deploy time.
# ─────────────────────────────────────────────────────────────────
ezua:
  # Application endpoint exposed via Istio VirtualService
  virtualService:
    endpoint: "${RELEASE_NAME}-${NAMESPACE}.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"

  # SSO / Istio AuthorizationPolicy
  authorizationPolicy:
    namespace: "istio-system"
    providerName: "oauth2-proxy"
    matchLabels:
      istio: "ingressgateway"
